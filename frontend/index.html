<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      color: #f59e0b;
    }
    .add-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 1rem;
    }
    input[type="text"]:focus { outline: 2px solid #f59e0b; border-color: transparent; }
    button {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-add { background: #f59e0b; color: #0f172a; }
    .btn-add:hover { background: #7dd3fc; }
    .btn-del { background: #ef4444; color: white; font-size: 0.8rem; padding: 0.4rem 0.7rem; }
    .btn-del:hover { background: #f87171; }
    .task-list { list-style: none; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      background: #1e293b;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      border: 1px solid #334155;
    }
    .task-item.done .task-title { text-decoration: line-through; opacity: 0.5; }
    .task-title { flex: 1; font-size: 1rem; }
    input[type="checkbox"] {
      width: 20px; height: 20px;
      accent-color: #f59e0b;
      cursor: pointer;
    }
    .empty {
      text-align: center;
      padding: 3rem;
      color: #64748b;
      font-size: 1.1rem;
    }
    .status {
      text-align: center;
      padding: 0.5rem;
      margin-bottom: 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      display: none;
    }
    .status.error { display: block; background: #7f1d1d; color: #fca5a5; }
    .status.ok { display: block; background: #14532d; color: #86efac; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>
    <div id="status" class="status"></div>
    <div class="add-form">
      <input type="text" id="taskInput" placeholder="What needs to be done?" />
      <button class="btn-add" onclick="addTask()">Add</button>
    </div>
    <ul class="task-list" id="taskList"></ul>
  </div>

  <script>
    const API = 'http://localhost:8000';

    async function loadTasks() {
      try {
        const res = await fetch(`${API}/tasks`);
        const tasks = await res.json();
        renderTasks(tasks);
        showStatus('Connected to API', 'ok');
      } catch (e) {
        showStatus('Cannot connect to API — is the backend running?', 'error');
      }
    }

    function renderTasks(tasks) {
      const list = document.getElementById('taskList');
      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty">No tasks yet. Add one above!</div>';
        return;
      }
      list.innerHTML = tasks.map(t => `
        <li class="task-item ${t.done ? 'done' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''}
            onchange="toggleTask('${t.id}', '${t.title.replace(/'/g, "\\'")}', '${t.description.replace(/'/g, "\\'")}', this.checked)" />
          <span class="task-title">${escapeHtml(t.title)}</span>
          <button class="btn-del" onclick="deleteTask('${t.id}')">Delete</button>
        </li>
      `).join('');
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }

    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) return;
      try {
        await fetch(`${API}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description: '', done: false })
        });
        input.value = '';
        loadTasks();
      } catch (e) {
        showStatus('Failed to add task', 'error');
      }
    }

    async function toggleTask(id, title, desc, done) {
      try {
        await fetch(`${API}/tasks/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description: desc, done })
        });
        loadTasks();
      } catch (e) {
        showStatus('Failed to update task', 'error');
      }
    }

    async function deleteTask(id) {
      try {
        await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
        loadTasks();
      } catch (e) {
        showStatus('Failed to delete task', 'error');
      }
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status ${type}`;
      if (type === 'ok') setTimeout(() => el.style.display = 'none', 2000);
    }

    // Enter key to add
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    loadTasks();
  </script>
</body>
</html>
