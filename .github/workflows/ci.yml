name: CI/CD Pipeline # name shown in GitHub Actions UI for the whole workflow

on: # defines what events trigger this workflow
  push: # trigger on git push
    branches: [main] # only when pushing to the main branch
  pull_request: # also trigger on pull requests
    branches: [main] # only PRs targeting main

jobs: # all the jobs this workflow runs

  test: # job id (used internally to reference this job)
    name: Run Tests # label shown in GitHub UI for this job
    runs-on: ubuntu-latest # use a fresh Ubuntu Linux runner machine

    services: # spin up helper containers alongside the job
      mongo: # name of this service (used as hostname inside the job)
        image: mongo:7 # pull MongoDB version 7 from Docker Hub
        ports:
          - 27017:27017 # map container port 27017 to runner port 27017

    steps: # ordered list of things to do in this job

      - name: Checkout code # step label shown in UI
        uses: actions/checkout@v4 # clones your repo onto the runner machine

      - name: Set up Python # step label
        uses: actions/setup-python@v5 # installs Python on the runner
        with:
          python-version: "3.12" # specifically Python 3.12

      - name: Install dependencies # step label
        run: | # run shell commands
          cd backend # go into the backend folder
          pip install -r requirements-dev.txt # install all dev dependencies including pytest

      - name: Run tests # step label
        env:
          MONGO_URL: mongodb://localhost:27017 # tell the app where to find the Mongo service
        run: |
          cd backend # go into the backend folder
          pytest test_main.py -v # run tests with verbose output

  build-and-push: # job id
    name: Build & Push to Docker Hub # label shown in GitHub UI
    runs-on: ubuntu-latest # fresh Ubuntu runner
    needs: test # only runs after the test job passes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # skip on PRs, only run on direct pushes to main

    steps:

      - name: Checkout code # clone the repo onto this runner too (each job gets a blank machine)
        uses: actions/checkout@v4

      - name: Log in to Docker Hub # step label
        uses: docker/login-action@v3 # official Docker login action
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # Docker Hub username from repo secrets
          password: ${{ secrets.DOCKERHUB_TOKEN }} # Docker Hub access token from repo secrets

      - name: Set up Docker Buildx # step label
        uses: docker/setup-buildx-action@v3 # enables BuildKit for faster, cacheable builds

      - name: Build & push backend # step label
        uses: docker/build-push-action@v5 # official action to build and push Docker images
        with:
          context: ./backend # use the backend folder as the Docker build context
          push: true # actually push to Docker Hub (false would just build locally)
          tags: | # two tags so you can use latest or roll back to a specific commit
            ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-backend:latest # always points to newest image
            ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-backend:${{ github.sha }} # unique tag per commit hash
          cache-from: type=gha # read build cache from GitHub Actions cache
          cache-to: type=gha,mode=max # write build cache back so next run is faster

      - name: Build & push frontend # step label
        uses: docker/build-push-action@v5 # same action for frontend
        with:
          context: ./frontend # use the frontend folder as the Docker build context
          push: true # push to Docker Hub
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-frontend:latest # latest frontend image
            ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-frontend:${{ github.sha }} # commit-pinned frontend image
          cache-from: type=gha # read from cache
          cache-to: type=gha,mode=max # write to cache

  smoke-test: # job id
    name: Docker Compose Smoke Test # label shown in GitHub UI
    runs-on: ubuntu-latest # fresh Ubuntu runner
    needs: test # only runs after tests pass (runs on PRs too, unlike build-and-push)

    steps:

      - name: Checkout code # clone repo onto this runner
        uses: actions/checkout@v4

      - name: Build images locally # step label
        run: | # build both images without pushing, just to verify they build
          docker build -t task-manager-backend ./backend # build backend image tagged locally
          docker build -t task-manager-frontend ./frontend # build frontend image tagged locally

      - name: Start stack # step label
        run: docker compose up -d # start all services in docker-compose.yml in detached (background) mode

      - name: Wait for backend to be ready # step label
        run: |
          for i in $(seq 1 15); do # try up to 15 times
            curl -sf http://localhost:8000/ && break # silent curl, exit loop if it succeeds
            echo "Attempt $i failed, retrying..." # log the failure
            sleep 2 # wait 2 seconds before retrying
          done

      - name: Check backend health # step label
        run: curl -f http://localhost:8000/ # fail the step if backend doesn't respond with 200

      - name: Check frontend serves HTML # step label
        run: curl -f http://localhost:3000/ # fail the step if frontend doesn't respond with 200

      - name: Tear down # step label
        if: always() # run this step even if earlier steps failed, so containers are always cleaned up
        run: docker compose down # stop and remove all containers started by compose up
