name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          MONGO_URL: mongodb://localhost:27017
        run: |
          cd backend
          pytest test_main.py -v

  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/task-manager-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images locally
        run: |
          docker build -t task-manager-backend ./backend
          docker build -t task-manager-frontend ./frontend

      - name: Start stack
        run: docker compose up -d

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/ && break
            echo "Attempt $i failed, retrying..."
            sleep 2
          done

      - name: Check backend health
        run: curl -f http://localhost:8000/

      - name: Check frontend serves HTML
        run: curl -f http://localhost:3000/

      - name: Tear down
        if: always()
        run: docker compose down
